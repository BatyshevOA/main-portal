<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="/main-portal/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея столярных работ "ГОРОД МАСТЕРОВ"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Удалён background-color: #FEF6E9; – теперь фон из style.css */
            color: #4A3B2A;
            line-height: 1.6;
        }

        header {
            /* Удалён background-color: #FEF6E9; */
            color: #4A3B2A;
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 3px solid #C1A585;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        header p {
            font-size: 1rem;
            opacity: 0.85;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .gallery-item {
            background: #B87C4F;
            background-image: 
                repeating-linear-gradient(90deg, 
                    rgba(0,0,0,0.12) 0px, 
                    rgba(0,0,0,0.12) 2px, 
                    transparent 2px, 
                    transparent 8px),
                repeating-linear-gradient(0deg, 
                    rgba(0,0,0,0.08) 0px, 
                    rgba(0,0,0,0.08) 1px, 
                    transparent 1px, 
                    transparent 5px);
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .gallery-item img {
            display: block;
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05);
        }

        .gallery-item video,
        .gallery-item iframe {
            display: block;
            width: 100%;
            height: 250px;
            border-radius: 12px;
            background-color: #000;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05);
        }

        .gallery-item iframe {
            border: none;
        }

        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border: 2px solid #D98C2E;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #D98C2E;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close:hover {
            color: #C1A585;
        }

        #caption {
            position: absolute;
            bottom: 20px;
            text-align: center;
            color: #FEF6E9;
            font-size: 1rem;
            width: 100%;
            background: rgba(0,0,0,0.5);
            padding: 0.5rem;
        }

        /* Адаптация для планшетов */
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }
            .gallery-item img,
            .gallery-item video,
            .gallery-item iframe {
                height: 200px;
            }
        }

        /* Адаптация для мобильных телефонов */
        @media (max-width: 480px) {
            header {
                padding: 1rem;
            }
            header h1 {
                font-size: 1.5rem;
            }
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .gallery-item img,
            .gallery-item video,
            .gallery-item iframe {
                height: 200px;
            }
            .gallery-container {
                margin: 1rem auto;
            }
        }
    </style>
</head>
<body class="gallery-page">
    <header>
        <h1>Галерея работ учеников "ГОРОД МАСТЕРОВ"</h1>
        <p>Столярное дело | С(К)ОШИ г. Ленска</p>
    </header>

    <div class="gallery-container">
        <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div id="caption"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ===== СПИСОК МЕДИАФАЙЛОВ =====
            const mediaFiles = [
                "01.jpg", "02.jpg", "03.jpg", "04.jpg", "05.jpg",
                "06.jpg", "07.jpg", "08.jpg", "09.jpg", "10.jpg", 
                "11.jpg", "12.jpg", "13.jpg", "14.jpg", "15.jpg",
                "16.jpg", "17.jpg", "18.jpg", "19.jpg", "20.jpg",
                "21.jpg", "22.jpg", "23.jpg", "24.jpg", "25.jpg",
                "26.jpg", "27.jpg", "28.jpg", "29.jpg", "30.jpg", 
                "31.jpg", "32.jpg", "33.jpg", "34.jpg", "35.jpg",
                "36.jpg", "37.jpg", "38.jpg", "39.jpg", "40.jpg",
                "41.jpg", "42.jpg", "43.jpg", "44.jpg", "45.jpg",
                "46.jpg", "47.jpg", "48.jpg", "49.jpg", "50.jpg", 
                "51.jpg", "52.jpg", "53.jpg", "54.jpg", "55.jpg",
                "56.jpg", "57.jpg", "58.jpg", "59.jpg", "60.jpg",
                "61.jpg", "62.jpg", "63.jpg", "64.jpg", "65.jpg",
                "66.jpg", "67.jpg", "68.jpg", "69.jpg", "70.jpg", 
                "71.jpg", "72.jpg", "73.jpg", "74.jpg", "75.jpg",
                "76.jpg", "77.jpg", "78.jpg", "79.jpg", "80.jpg",
                "81.jpg", "82.jpg", "83.jpg", "84.jpg", "85.jpg",
                "86.jpg", "87.jpg", "88.jpg", "89.jpg", "90.mp4", "91.jpg", "92.jpg", "93.jpg", "94.jpg", "95.jpg","96.jpg","97.jpg","98.jpg","99.jpg","100.jpg"
                // , "video.mp4"          // пример локального видео
                // , "https://www.youtube.com/embed/VIDEO_ID"  // YouTube
            ];
            // =================================

            const grid = document.getElementById('gallery-grid');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.querySelector('.close');
            let currentMediaIndex = 0;
            let mediaList = [];

            function getMediaType(src) {
                if (src.includes('youtube.com/embed') || src.includes('youtu.be')) {
                    return 'youtube';
                }
                const ext = src.split('.').pop().toLowerCase();
                if (['jpg', 'jpeg', 'png', 'gif'].includes(ext)) return 'image';
                if (['mp4', 'webm', 'mov'].includes(ext)) return 'video';
                return 'unknown';
            }

            if (!mediaFiles.length) {
                grid.innerHTML = '<p style="text-align:center;">Пока нет загруженных работ.</p>';
                return;
            }

            mediaFiles.forEach(function(file, idx) {
                let src = file;
                if (!file.startsWith('http')) {
                    src = 'uploads/' + file;
                }
                mediaList.push(src);

                const item = document.createElement('div');
                item.className = 'gallery-item';

                const mediaType = getMediaType(src);

                if (mediaType === 'image') {
                    const img = document.createElement('img');
                    img.src = src;
                    img.alt = 'Столярная работа';
                    img.loading = 'lazy';
                    item.appendChild(img);
                    item.addEventListener('click', function() { openLightbox(idx); });
                } 
                else if (mediaType === 'video') {
                    const video = document.createElement('video');
                    video.src = src;
                    video.controls = true;
                    video.preload = 'metadata';
                    video.style.width = '100%';
                    video.style.height = '250px';
                    video.style.objectFit = 'cover';
                    video.addEventListener('click', function(e) { e.stopPropagation(); });
                    item.appendChild(video);
                } 
                else if (mediaType === 'youtube') {
                    const iframe = document.createElement('iframe');
                    iframe.src = src;
                    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
                    iframe.allowFullscreen = true;
                    iframe.style.width = '100%';
                    iframe.style.height = '250px';
                    iframe.style.border = 'none';
                    iframe.style.borderRadius = '12px';
                    item.appendChild(iframe);
                }

                grid.appendChild(item);
            });

            function openLightbox(index) {
                const media = mediaList[index];
                if (getMediaType(media) !== 'image') return;
                currentMediaIndex = index;
                lightboxImg.src = media;
                lightbox.style.display = 'flex';
                document.getElementById('caption').innerHTML = '';
            }

            function closeLightbox() {
                lightbox.style.display = 'none';
            }

            closeBtn.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox) closeLightbox();
            });

            document.addEventListener('keydown', function(e) {
                if (lightbox.style.display === 'flex') {
                    if (e.key === 'Escape') {
                        closeLightbox();
                    } else if (e.key === 'ArrowLeft') {
                        let newIndex = currentMediaIndex - 1;
                        while (newIndex >= 0 && getMediaType(mediaList[newIndex]) !== 'image') newIndex--;
                        if (newIndex >= 0) {
                            currentMediaIndex = newIndex;
                            lightboxImg.src = mediaList[currentMediaIndex];
                        }
                    } else if (e.key === 'ArrowRight') {
                        let newIndex = currentMediaIndex + 1;
                        while (newIndex < mediaList.length && getMediaType(mediaList[newIndex]) !== 'image') newIndex--;
                        if (newIndex < mediaList.length) {
                            currentMediaIndex = newIndex;
                            lightboxImg.src = mediaList[currentMediaIndex];
                        }
                    }
                }
            });
        });
    </script>
    <script src="/main-portal/script.js" defer></script>
    <a href="/main-portal/index.html" class="floating-home-btn">🏠 На главную</a>
</body>
</html>
