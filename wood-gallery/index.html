<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея столярных работ "ГОРОД МАСТЕРОВ"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #FEF6E9;
            color: #4A3B2A;
            line-height: 1.6;
        }

        header {
            background-color: #FEF6E9;
            color: #4A3B2A;
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 3px solid #C1A585;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        header p {
            font-size: 1rem;
            opacity: 0.85;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        /* Деревянная рамка */
        .gallery-item {
            background: #B87C4F;
            background-image: 
                repeating-linear-gradient(90deg, 
                    rgba(0,0,0,0.12) 0px, 
                    rgba(0,0,0,0.12) 2px, 
                    transparent 2px, 
                    transparent 8px),
                repeating-linear-gradient(0deg, 
                    rgba(0,0,0,0.08) 0px, 
                    rgba(0,0,0,0.08) 1px, 
                    transparent 1px, 
                    transparent 5px);
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .gallery-item img {
            display: block;
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05);
        }

        /* Лайтбокс */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border: 2px solid #D98C2E;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #D98C2E;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close:hover {
            color: #C1A585;
        }

        #caption {
            position: absolute;
            bottom: 20px;
            text-align: center;
            color: #FEF6E9;
            font-size: 1rem;
            width: 100%;
            background: rgba(0,0,0,0.5);
            padding: 0.5rem;
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }
            .gallery-item img {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Галерея работ учеников "ГОРОД МАСТЕРОВ"</h1>
        <p>Столярное дело | С(К)ОШИ г. Ленска</p>
    </header>

    <div class="gallery-container">
        <div class="gallery-grid" id="gallery-grid">
            <!-- сюда будут подгружены изображения -->
        </div>
    </div>

    <!-- Лайтбокс -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div id="caption"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ===== СПИСОК ВАШИХ ФАЙЛОВ =====
            // Впишите сюда имена всех изображений, которые лежат в папке uploads/
            const imageFiles = [
                "01.jpg",
                "02.jpg",
                "03.jpg",
                "04.jpg",
                "05.jpg",
                "06.jpg",
                "07.jpg",
                "08.jpg",
                "09.jpg",
                "10.jpg",
                "11.jpg",
                "12.jpg",
                "13.jpg",
                "14.jpg",
                "15.jpg",
                "16.jpg",
                "17.jpg",
                "18.jpg",
                "19.jpg",
                "20.jpg",
                "21.jpg",
                "22.jpg",
                "23.jpg",
                "24.jpg",
                "25.jpg",
                "26.jpg",
                "27.jpg",
                "28.jpg",
                "29.jpg",
                "30.jpg",
                "31.jpg",
                "32.jpg","33.jpg","34.jpg","35.jpg","36.jpg","37.jpg","38.jpg","39.jpg","40.jpg","41.jpg","42.jpg","43.jpg","44.jpg","45.jpg","46.jpg","47.jpg","48.jpg","49.jpg","50.jpg","51.jpg","52.jpg","53.jpg","54.jpg","55.jpg","56.jpg","57.jpg","58.jpg","59.jpg","60.jpg","61.jpg","62.jpg","63.jpg","64.jpg","65.jpg","66.jpg","67.jpg","68.jpg","69.jpg","70.jpg","71.jpg","72.jpg","73.jpg","77.jpg","78.jpg","79.jpg","80.jpg","81.jpg","82.jpg","83.jpg",
                // добавляйте новые строки через запятую
            ];
            // =================================

            const grid = document.getElementById('gallery-grid');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.querySelector('.close');
            let currentImageIndex = 0;
            let imagesList = [];

            if (!imageFiles.length) {
                grid.innerHTML = '<p style="text-align:center;">Пока нет загруженных работ.</p>';
                return;
            }

            imageFiles.forEach((file, idx) => {
                const imgPath = `uploads/${file}`;
                imagesList.push(imgPath);

                const item = document.createElement('div');
                item.className = 'gallery-item';
                const img = document.createElement('img');
                img.src = imgPath;
                img.alt = 'Столярная работа';
                img.loading = 'lazy';
                item.appendChild(img);
                item.addEventListener('click', () => openLightbox(idx));
                grid.appendChild(item);
            });

            function openLightbox(index) {
                currentImageIndex = index;
                lightboxImg.src = imagesList[currentImageIndex];
                lightbox.style.display = 'flex';
                document.getElementById('caption').innerHTML = '';
            }

            function closeLightbox() {
                lightbox.style.display = 'none';
            }

            closeBtn.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });

            document.addEventListener('keydown', (e) => {
                if (lightbox.style.display === 'flex') {
                    if (e.key === 'Escape') {
                        closeLightbox();
                    } else if (e.key === 'ArrowLeft') {
                        currentImageIndex = (currentImageIndex - 1 + imagesList.length) % imagesList.length;
                        lightboxImg.src = imagesList[currentImageIndex];
                    } else if (e.key === 'ArrowRight') {
                        currentImageIndex = (currentImageIndex + 1) % imagesList.length;
                        lightboxImg.src = imagesList[currentImageIndex];
                    }
                }
            });
        });
    </script>
</body>
</html>
